<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gacha - Republic Momer Games</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="app">
        <h1>🎴 Gacha de Personajes</h1>
        
        <div id="user-area">
            <p>Usuario: <span id="user-name">Invitado</span></p>
            <p>🪙 Monedas: <span id="user-coins">0</span></p>
        </div>

        <div id="gacha-box">
            <div id="character-display">
                <img id="char-image" src="" alt="Personaje" style="display: none;">
                <h2 id="char-name">???</h2>
                <p id="char-rarity">⭐ Rareza: ???</p>
                <p id="char-value">🪙 Valor: ???</p>
            </div>
            
            <div id="button-area">
                <button id="btn-rw">🔄 #rw</button>
                <button id="btn-claim" disabled>📥 #claim</button>
            </div>
            
            <p id="message"></p>
        </div>

        <button id="btn-inventory">📂 Ver Colección</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
